services:
  mysql:
    image: mysql:8.0
    container_name: ojt-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: astracine
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    container_name: ojt-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
