# 2. Cấu hình JPA / Hibernate
# 'update': Tự động cập nhật bảng nếu Entity thay đổi (Rất tiện khi Dev)
# 'validate': Chỉ kiểm tra xem Code và DB có khớp nhau không
spring.jpa.hibernate.ddl-auto=update

# Hiển thị câu lệnh SQL trong Console để dễ debug (Xem nó insert ghế thế nào)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Platform
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

